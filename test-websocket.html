<!DOCTYPE html><html><head><title>WebSocket Test</title></head><body><h1>WebSocket Test</h1><div id="status">Connecting...</div><div id="log"></div><script>const ws = new WebSocket("wss://minimal-websocket-test.enderman-bm.workers.dev/ws"); const statusDiv = document.getElementById("status"); const logDiv = document.getElementById("log"); function log(message) { const p = document.createElement("p"); p.textContent = message; logDiv.appendChild(p); } ws.onopen = function() { statusDiv.textContent = "Connected!"; log("Connected to WebSocket"); ws.send("Hello from browser!"); }; ws.onmessage = function(event) { log("Received: " + event.data); }; ws.onerror = function(error) { statusDiv.textContent = "Error!"; log("WebSocket error: " + error); }; ws.onclose = function() { statusDiv.textContent = "Disconnected"; log("WebSocket closed"); }; </script></body></html>
