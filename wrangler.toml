name = "lumino-collaborative-server"
main = "dist/cloudflareWorker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Build configuration for TypeScript
[build]
command = "npm run build"

# Environment variables
[vars]
ENVIRONMENT = "production"

# Routes configuration - 支持 workers.dev 和自定义域名
[[routes]]
pattern = "lumino-02.afeu20u3jfocas.dpdns.org"
custom_domain = true

# KV namespace for persistence
[[kv_namespaces]]
binding = "LUMINO_KV"
id = "a85a34f27fcf4bf4b86efa21a534c072"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

# Durable Object binding for log broadcasting
[[durable_objects.bindings]]
name = "LOG_DURABLE_OBJECT"
class_name = "LogDurableObject"

# Durable Object binding for room management
[[durable_objects.bindings]]
name = "ROOM_DURABLE_OBJECT"
class_name = "RoomDurableObject"

# Durable Object migration for free plan (using SQLite storage)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["LogDurableObject", "RoomDurableObject"]
